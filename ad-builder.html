<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chakradham Ad Bridge Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Noto+Sans+Bengali:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0A4D68; --secondary: #088395; --accent: #05BFDB; --bg: #F0F5F9; }
        body { font-family: 'Poppins', 'Noto Sans Bengali', sans-serif; background: var(--bg); color: #333; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; margin-bottom: 2rem; border-bottom: 3px solid var(--accent); padding-bottom: 10px; }
        .form-row { display: flex; gap: 15px; margin-bottom: 1.5rem; }
        .form-group { flex: 1; margin-bottom: 1.5rem; }
        .form-row .form-group { margin-bottom: 0; }
        label { display: block; font-weight: 600; margin-bottom: 5px; color: var(--secondary); font-size: 0.95rem; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 1rem; outline: none; box-sizing: border-box; }
        input:focus, select:focus { border-color: var(--accent); }
        .ad-item { background: #f8fafc; padding: 15px; border: 1px dashed var(--secondary); border-radius: 8px; margin-bottom: 15px; position: relative; }
        .remove-btn { position: absolute; top: 10px; right: 10px; background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn { background: var(--primary); color: white; padding: 12px 25px; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; font-weight: 600; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn:hover { background: var(--secondary); }
        .btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); width: auto; }
        .btn-outline:hover { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <div class="container">
        <h1>অটো-স্লাইডশো বিজ্ঞাপন (ভিডিও/ছবি) টুল</h1>
        
        <div class="form-row">
            <div class="form-group">
                <label>প্রতিটি অ্যাড কত সেকেন্ড পর বদলাবে?</label>
                <input type="number" id="adSlideTime" value="4" min="1">
                <small style="color:#666;">(ভিডিও শেষ হওয়া পর্যন্ত চলবে)</small>
            </div>
            <div class="form-group">
                <label>স্কিপ বাটন কত সেকেন্ড পর আসবে?</label>
                <input type="number" id="skipDuration" value="8" min="1">
            </div>
        </div>

        <div class="form-group">
            <label>ব্যাকগ্রাউন্ড মিউজিক (MP3 লিং্ক - ঐচ্ছিক)</label>
            <input type="text" id="bgMusic" placeholder="https://example.com/music.mp3">
        </div>

        <div class="form-group">
            <label>ডিফল্ট রেজাল্ট পেজ (যদি URL Parameter না থাকে)</label>
            <input type="text" id="targetReturnUrl" value="index.html" placeholder="index.html">
            <small style="color:#666;">বিঃদ্রঃ স্টোরি পেজ থেকে ?next=link পাঠালে এটি অটোমেটিক সেই লিংকেই যাবে।</small>
        </div>

        <div id="adList">
            <h3 style="color: var(--primary); margin-top: 2rem;">বিজ্ঞাপন তালিকা</h3>
        </div>

        <button class="btn btn-outline" onclick="addAdField()">+ নতুন অ্যাড যুক্ত করুন</button>
        <button class="btn" style="margin-top: 30px; background: #10b981;" onclick="generateAdFile()">⬇️ Full Screen Ad Bridge ডাউনলোড করুন</button>
    </div>

    <script>
        let adCount = 0;

        function addAdField() {
            adCount++;
            const div = document.createElement('div');
            div.className = 'ad-item';
            div.id = `ad-${adCount}`;
            div.innerHTML = `
                <button class="remove-btn" onclick="document.getElementById('ad-${adCount}').remove()">X</button>
                <div class="form-row">
                    <div class="form-group">
                        <label>অ্যাডের ধরন</label>
                        <select class="ad-type">
                            <option value="image">Image (ছবি)</option>
                            <option value="video">Video (ভিডিও MP4)</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>অ্যাড মিডিয়া লিংক</label>
                    <input type="text" class="ad-media" placeholder="https://example.com/ad.jpg বা ad.mp4">
                </div>
                <div class="form-group">
                    <label>ক্লিক করলে যে লিংকে যাবে (ঐচ্ছিক)</label>
                    <input type="text" class="ad-link" placeholder="https://your-sponsor.com">
                </div>
            `;
            document.getElementById('adList').appendChild(div);
        }

        addAdField(); // First empty field

        function generateAdFile() {
            const slideTime = document.getElementById('adSlideTime').value || 4;
            const skipDuration = document.getElementById('skipDuration').value || 8;
            const bgMusic = document.getElementById('bgMusic').value.trim();
            const defaultUrl = document.getElementById('targetReturnUrl').value.trim();
            
            const adItems = document.querySelectorAll('.ad-item');
            let adsArray = [];
            adItems.forEach(item => {
                const type = item.querySelector('.ad-type').value;
                const media = item.querySelector('.ad-media').value.trim();
                const link = item.querySelector('.ad-link').value.trim() || '#';
                if(media) adsArray.push({ type: type, media: media, link: link });
            });

            if(adsArray.length === 0) {
                alert("কমপক্ষে একটি অ্যাড মিডিয়া লিং্ক দিন!");
                return;
            }

            const htmlContent = `<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chakradham Ad</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #0f172a; overflow: hidden; font-family: 'Poppins', sans-serif; }
        
        .brand-bg { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1; color: #38bdf8; text-align: center; }
        .brand-bg svg { width: 80px; height: 80px; animation: spin 4s linear infinite; margin-bottom: 10px; opacity: 0.5; }
        .brand-bg h2 { margin: 0; font-size: 2rem; letter-spacing: 2px; opacity: 0.7; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .ad-container { position: relative; z-index: 10; width: 100%; height: 100%; }
        .ad-media { width: 100vw; height: 100vh; object-fit: contain; cursor: pointer; display: none; opacity: 0; transition: opacity 0.5s ease-in-out; }
        .ad-media.active { display: block; opacity: 1; }
        
        #startScreen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: flex; align-items: center; justify-content: center; }
        .start-btn { background: #0ea5e9; color: white; border: none; padding: 15px 40px; font-size: 1.5rem; border-radius: 50px; cursor: pointer; font-family: inherit; font-weight: bold; box-shadow: 0 0 20px rgba(14, 165, 233, 0.5); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .ui-overlay { position: absolute; top: 20px; right: 20px; z-index: 100; display: flex; flex-direction: column; align-items: flex-end; }
        .timer-box { background: rgba(0, 0, 0, 0.7); color: white; padding: 10px 20px; border-radius: 30px; font-size: 1rem; border: 1px solid rgba(255,255,255,0.3); backdrop-filter: blur(5px); }
        .skip-btn { display: none; background: rgba(0, 0, 0, 0.8); color: white; border: 2px solid white; padding: 12px 25px; border-radius: 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; backdrop-filter: blur(5px); }
        .skip-btn:hover { background: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body>
    ${bgMusic ? `<audio id="bgAudio" src="${bgMusic}" loop></audio>` : ''}
    
    <div class="brand-bg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a10 10 0 0 1 10 10"></path></svg>
        <h2>CHAKRADHAM ONLINE</h2>
    </div>

    <div id="startScreen">
        <button class="start-btn" onclick="initAdSystem()">Tap to Start</button>
    </div>

    <a id="adLink" href="#" target="_self" class="ad-container">
        <img id="adImg" class="ad-media" src="" alt="Advertisement">
        <video id="adVid" class="ad-media" src="" playsinline muted></video>
    </a>

    <div class="ui-overlay">
        <div class="timer-box" id="timerBox">
            বিজ্ঞাপন স্কিপ করতে <span id="timeCount">${skipDuration}</span> সেকেন্ড...
        </div>
        <button class="skip-btn" id="skipBtn" onclick="skipAd()">Skip Ad ⏭</button>
    </div>

    <script>
        // --- Smart URL Routing Logic ---
        // URL থেকে ?next= এর ভ্যালু নেবে, না পেলে defaultUrl ব্যবহার করবে
        const urlParams = new URLSearchParams(window.location.search);
        const dynamicReturnUrl = urlParams.get('next');
        const finalReturnUrl = dynamicReturnUrl ? decodeURIComponent(dynamicReturnUrl) : '${defaultUrl}';

        const ads = ${JSON.stringify(adsArray)};
        const slideIntervalTime = parseInt('${slideTime}') * 1000;
        let waitDuration = parseInt('${skipDuration}');
        
        let currentAdIndex = 0;
        let skipTimerInterval;
        let slideTimer;

        const ui = {
            startScreen: document.getElementById('startScreen'),
            link: document.getElementById('adLink'),
            img: document.getElementById('adImg'),
            vid: document.getElementById('adVid'),
            audio: document.getElementById('bgAudio'),
            timerBox: document.getElementById('timerBox'),
            timeCount: document.getElementById('timeCount'),
            skipBtn: document.getElementById('skipBtn')
        };

        function initAdSystem() {
            ui.startScreen.style.display = 'none';
            if(ui.audio) { ui.audio.volume = 0.5; ui.audio.play().catch(e=>{}); }
            startSkipTimer();
            showAd(0);
        }

        function showAd(index) {
            clearTimeout(slideTimer);
            const ad = ads[index];
            
            ui.img.classList.remove('active');
            ui.vid.classList.remove('active');
            ui.vid.pause();

            ui.link.href = ad.link !== '#' ? ad.link : 'javascript:void(0)';

            if (ad.type === 'video') {
                ui.vid.src = ad.media;
                ui.vid.muted = false; 
                if(ui.audio) ui.audio.pause(); 
                
                ui.vid.onloadeddata = () => { ui.vid.classList.add('active'); ui.vid.play(); };
                ui.vid.onended = () => { nextAd(); };
            } else {
                if(ui.audio && ui.audio.paused) ui.audio.play(); 
                ui.img.src = ad.media;
                ui.img.onload = () => { ui.img.classList.add('active'); };
                if(ads.length > 1) { slideTimer = setTimeout(nextAd, slideIntervalTime); }
            }
        }

        function nextAd() {
            if(ads.length > 1) {
                currentAdIndex = (currentAdIndex + 1) % ads.length;
                showAd(currentAdIndex);
            }
        }

        function startSkipTimer() {
            ui.timerBox.style.display = 'block';
            ui.skipBtn.style.display = 'none';
            ui.timeCount.innerText = waitDuration;
            
            skipTimerInterval = setInterval(() => {
                waitDuration--;
                if (waitDuration > 0) {
                    ui.timeCount.innerText = waitDuration;
                } else {
                    clearInterval(skipTimerInterval);
                    ui.timerBox.style.display = 'none';
                    ui.skipBtn.style.display = 'block';
                }
            }, 1000);
        }

        function skipAd() {
            // একই ট্যাবে টার্গেট লিংকে রিডাইরেক্ট করবে
            window.location.href = finalReturnUrl;
        }
    <\/script>
</body>
</html>`;

            const blob = new Blob([htmlContent], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'ad_bridge.html';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
